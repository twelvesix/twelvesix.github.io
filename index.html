<!DOCTYPE html>
<html>
    <body>
        <div class="lds-heart"><div></div></div>
    </body>
</html>

<style>
    html {
        vertical-align: middle;
        height: 100%;
        background-color: #181717;
    }
    body {
        display: grid;
        place-items: center;
        height: 100%;
        margin: auto;
        font-size: larger;
        font-family: Arial, Helvetica, sans-serif;
    }
    .lds-heart {
        display: inline-block;
        position: relative;
        transform: rotate(45deg);
    }
    .lds-heart div {
        width: 150px;
        height: 150px;
        animation: lds-heart 1.2s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
        background-color: #ff0000;
    }
    .lds-heart div:after,
    .lds-heart div:before {
        content: " ";
        position: absolute;
        display: block;
    }
    .lds-heart div:before {
        left: -100px;
        width: 150px;
        height: 150px;
        border-radius: 50% 0 0 50%;
        background-color: #ff0000;
    }
    .lds-heart div:after {
        top: -105px;
        width: 150px;
        height: 150px;
        border-radius: 50% 50% 0 0;
        background-color: #ff0000;
    }
    @keyframes lds-heart {
        0% {
            transform: scale(0.95);
        }
        5% {
            transform: scale(1.1);
        }
        39% {
            transform: scale(0.85);
        }
        45% {
            transform: scale(1);
        }
        60% {
            transform: scale(0.95);
        }
        100% {
            transform: scale(0.9);
        }
    }
</style>
